name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to droplet
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes root@${{ secrets.SSH_HOST }} << 'ENDSSH'
            set -e
            echo "=== Creating deployment directory ==="
            mkdir -p /opt/loading-alphavantage

            echo "=== Stopping existing PM2 process ==="
            pm2 stop loading-alphavantage 2>/dev/null || true
            pm2 delete loading-alphavantage 2>/dev/null || true
          ENDSSH

          echo "=== Copying files to droplet ==="
          rsync -az -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            ./ \
            root@${{ secrets.SSH_HOST }}:/opt/loading-alphavantage/

          echo "=== Installing dependencies and building ==="
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes root@${{ secrets.SSH_HOST }} << 'ENDSSH'
            set -e
            cd /opt/loading-alphavantage

            echo "=== Writing environment variables ==="
            cat > .env << 'ENVEOF'
ALPHA_VANTAGE_EARNINGS_KEY=${{ secrets.ALPHA_VANTAGE_EARNINGS_KEY }}
ALPHA_VANTAGE_LISTING_KEY=${{ secrets.ALPHA_VANTAGE_LISTING_KEY }}
ALPHA_VANTAGE_IPO_KEY=${{ secrets.ALPHA_VANTAGE_IPO_KEY }}
ENVEOF

            echo "=== Installing dependencies ==="
            npm install

            echo "=== Building Next.js app ==="
            npm run build

            echo "=== Starting with PM2 ==="
            pm2 start npm --name "loading-alphavantage" -- start

            echo "=== Saving PM2 state ==="
            pm2 save

            echo "=== PM2 Status ==="
            pm2 list
          ENDSSH

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes root@${{ secrets.SSH_HOST }} << 'ENDSSH'
            echo "=== Waiting for app to start ==="
            sleep 10

            echo "=== PM2 Status ==="
            pm2 list

            echo ""
            echo "=== Health Check ==="
            curl -s http://localhost:3000/api/health || echo "Health check failed or app not responding"
          ENDSSH
